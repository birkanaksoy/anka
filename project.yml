name: Anka
options:
  bundleIdPrefix: com.birkanaksoy
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES

packages:
  AnkaShared:
    path: Shared

targets:
  Anka:
    type: application
    platform: iOS
    sources:
      - path: iPhone
    dependencies:
      - package: AnkaShared
      - target: AnkaWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.birkanaksoy.anka
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: Anka
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Anka grows and evolves from your daily steps, heart rate, stand hours, sleep and workouts."
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.games
        CODE_SIGN_ENTITLEMENTS: iPhone/Anka.entitlements
    info:
      path: iPhone/Info.plist
      properties:
        BGTaskSchedulerPermittedIdentifiers:
          - com.birkanaksoy.anka.dailyRefresh
        UIBackgroundModes:
          - fetch
          - processing

  AnkaWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
    dependencies:
      - package: AnkaShared
      - target: AnkaWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.birkanaksoy.anka.watchkitapp
        INFOPLIST_KEY_CFBundleDisplayName: Anka
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: NO
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.birkanaksoy.anka
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Anka grows and evolves from your daily steps, heart rate, stand hours, sleep and workouts."
        CODE_SIGN_ENTITLEMENTS: Watch/AnkaWatch.entitlements

  AnkaWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: Widget
    dependencies:
      - package: AnkaShared
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.birkanaksoy.anka.watchkitapp.widget
        CODE_SIGN_ENTITLEMENTS: Widget/AnkaWidget.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Anka
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widget/Info.plist

  AnkaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Anka
      - package: AnkaShared

schemes:
  Anka:
    build:
      targets:
        Anka: all
    test:
      targets:
        - AnkaTests
    run:
      config: Debug
  AnkaWatch:
    build:
      targets:
        AnkaWatch: all
    run:
      config: Debug
